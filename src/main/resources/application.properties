spring.datasource.url=jdbc:mysql://localhost:3306/faculty_tracker
spring.datasource.username=root
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
server.port=8081

spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
server.tomcat.max-http-form-post-size=50MB
server.tomcat.max-swallow-size=-1

# Import the hidden secret file
spring.config.import=optional:file:./application-secret.properties

# Google Drive Credentials
google.drive.client.id=${google.drive.client.id}
google.drive.client.secret=${google.drive.client.secret}
google.drive.refresh.token=${google.drive.refresh.token}
google.drive.folder.id=${google.drive.folder.id}

# Gemini AI API Key (add your key in application-secret.properties)
groq.api.key=${groq.api.key:}