<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Admin Panel - Academic Tracker</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <style>
        .dept-section { margin-bottom: 2.5rem; }
        .dept-title { font-size: 1.1rem; font-weight: 700; color: var(--text-main); margin-bottom: 1rem; display: flex; align-items: center; gap: 0.75rem; }
        .hod-badge { background: #2d1f5e; color: #a78bfa; padding: 0.2rem 0.65rem; border-radius: 99px; font-size: 0.75rem; font-weight: 600; }
        .faculty-badge { background: #1e3a5f; color: #60a5fa; padding: 0.2rem 0.65rem; border-radius: 99px; font-size: 0.75rem; font-weight: 600; }
        .admin-badge { background: #1a3a1f; color: #4ade80; padding: 0.2rem 0.65rem; border-radius: 99px; font-size: 0.75rem; font-weight: 600; }
        .user-row { display: flex; align-items: center; justify-content: space-between; padding: 0.75rem 1rem; border-radius: 8px; background: var(--input-bg); margin-bottom: 0.5rem; gap: 1rem; }
        .user-info { display: flex; align-items: center; gap: 0.75rem; }
        .user-actions { display: flex; gap: 0.5rem; flex-shrink: 0; }
        .btn-make-hod { background: #5b21b6; color: #fff; border: none; padding: 0.35rem 0.85rem; border-radius: 6px; font-size: 0.82rem; cursor: pointer; font-weight: 500; }
        .btn-make-hod:hover { background: #6d28d9; }
        .btn-remove-hod { background: #7f1d1d; color: #fca5a5; border: none; padding: 0.35rem 0.85rem; border-radius: 6px; font-size: 0.82rem; cursor: pointer; font-weight: 500; }
        .btn-remove-hod:hover { background: #991b1b; }
        .msg-success { background: #14532d; color: #4ade80; padding: 0.75rem 1.25rem; border-radius: 8px; margin-bottom: 1.5rem; font-weight: 500; }
        .msg-error { background: #450a0a; color: #f87171; padding: 0.75rem 1.25rem; border-radius: 8px; margin-bottom: 1.5rem; font-weight: 500; }
    </style>
</head>

<body>
<div class="container">

    <!-- Nav -->
    <div class="nav-bar" style="display:flex; align-items:center; justify-content:space-between; padding:0.75rem 1.5rem; background:var(--card-bg); border-bottom:1px solid var(--border); border-radius:12px; margin-bottom:2rem;">
        <span style="font-size:1.1rem; font-weight:700;">🛡️ Admin Panel</span>
        <div style="display:flex; align-items:center; gap:1rem;">
            <a href="/" style="color:var(--primary); font-size:0.9rem; text-decoration:none;">🏠 Dashboard</a>
            <form th:action="@{/logout}" method="post" style="margin:0;">
                <button type="submit" class="btn-clear" style="font-size:0.88rem;">Logout</button>
            </form>
        </div>
    </div>

    <h2 style="margin-bottom:0.5rem;">Assign / Change HOD by Department</h2>
    <p style="color:var(--text-muted); margin-bottom:2rem;">Select "Make HOD" to promote a faculty member. The previous HOD will automatically be demoted to Faculty.</p>

    <div th:if="${param.success}" class="msg-success">
        ✅ <span th:text="${param.success == 'HodUpdated' ? 'HOD updated successfully.' : 'HOD removed successfully.'}"></span>
    </div>
    <div th:if="${param.error}" class="msg-error">
        ❌ Error: <span th:text="${param.error}"></span>
    </div>

    <div class="card">
        <div th:each="entry : ${byDepartment}" class="dept-section">
            <div class="dept-title">
                🏛️ <span th:text="${entry.key}"></span>
                <span th:if="${currentHods[entry.key] != null}" class="hod-badge">
                    HOD: <span th:text="${currentHods[entry.key].username}"></span>
                </span>
                <span th:if="${currentHods[entry.key] == null}" style="color:#f59e0b; font-size:0.8rem;">⚠ No HOD assigned</span>
            </div>

            <div th:each="user : ${entry.value}">
                <div class="user-row">
                    <div class="user-info">
                        <span th:if="${user.role.name() == 'ROLE_HOD'}" class="hod-badge">HOD</span>
                        <span th:if="${user.role.name() == 'ROLE_FACULTY'}" class="faculty-badge">Faculty</span>
                        <span th:text="${user.username}" style="font-weight:500; color:var(--text-main);"></span>
                        <span th:if="${user.email != null}" th:text="${user.email}" style="color:var(--text-muted); font-size:0.82rem;"></span>
                    </div>
                    <div class="user-actions">
                        <!-- Promote to HOD button (only for FACULTY users) -->
                        <form th:if="${user.role.name() == 'ROLE_FACULTY'}" th:action="@{/admin/setHod}" method="post">
                            <input type="hidden" name="userId" th:value="${user.id}">
                            <button type="submit" class="btn-make-hod">👑 Make HOD</button>
                        </form>
                        <!-- Remove HOD button (only for current HOD) -->
                        <form th:if="${user.role.name() == 'ROLE_HOD'}" th:action="@{/admin/removeHod}" method="post"
                              onsubmit="return confirm('Remove HOD status from this user?');">
                            <input type="hidden" name="userId" th:value="${user.id}">
                            <button type="submit" class="btn-remove-hod">✖ Remove HOD</button>
                        </form>
                    </div>
                </div>
            </div>
            <hr style="border:none; border-top:1px solid var(--border); margin-top:1.5rem;">
        </div>
    </div>
</div>
</body>
</html>
